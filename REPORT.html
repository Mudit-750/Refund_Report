<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="icon"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons/icons/sparkles.svg"
      type="image/svg+xml"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="storm-wrap">
      <h2 class="sr-only">
        AI-generated refund strategy ideas for Fengyi's Croatia tour
        cancellation
      </h2>

      <div class="storm-header">
        <h2>Refund strategy AIstorm</h2>
        <p>
          12 ideas across 5 tracks — click any card to expand. Filter by track
          below.
        </p>
      </div>

      <div class="stats-bar">
        <div class="stat">
          <div class="stat-n">€10,573</div>
          <div class="stat-l">at stake</div>
        </div>
        <div class="stat">
          <div class="stat-n">5</div>
          <div class="stat-l">strategy tracks</div>
        </div>
        <div class="stat">
          <div class="stat-n">12</div>
          <div class="stat-l">ideas total</div>
        </div>
        <div class="stat">
          <div class="stat-n">3</div>
          <div class="stat-l">high leverage</div>
        </div>
      </div>

      <div class="filter-bar" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="legal">Legal</button>
        <button class="filter-btn" data-filter="pressure">Pressure</button>
        <button class="filter-btn" data-filter="insurance">Insurance</button>
        <button class="filter-btn" data-filter="creative">Creative</button>
        <button class="filter-btn" data-filter="direct">
          Direct negotiation
        </button>
      </div>

      <div class="ideas-grid" id="grid"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
